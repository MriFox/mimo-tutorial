<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业证书 - MiMo Code 教程</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
    }
    header {
      display: none;
    }
    footer {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <main style="padding: 40px 20px;">
    <div class="certificate" id="certificate">
      <div class="certificate-badge">🎓</div>
      <h1>毕业证书</h1>
      <h2>Certificate of Completion</h2>
      
      <div class="certificate-info">兹证明</div>
      <div class="certificate-name" id="student-name">MiMo Code 学员</div>
      
      <div class="certificate-info">
        已完成 <strong>MiMo Code 新手教程</strong> 全部课程学习
      </div>
      <div class="certificate-info">
        并通过毕业考试
      </div>
      
      <div class="certificate-score" id="score-display">100 分</div>
      
      <div class="certificate-info">
        特此颁发此证书，以资鼓励
      </div>
      
      <div class="certificate-date" id="cert-date">2024年1月1日</div>
      
      <div style="margin-top: 24px; padding-top: 24px; border-top: 1px dashed #e2e8f0;">
        <div style="color: #64748b; font-size: 0.9rem;">MiMo Code 教程团队</div>
        <div style="color: #94a3b8; font-size: 0.8rem; margin-top: 8px;">证书编号: <span id="cert-id">MC-20240101-001</span></div>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 40px;">
      <button onclick="printCertificate()" class="btn" style="margin: 0 8px;">
        🖨️ 打印证书
      </button>
      <a href="../index.html" class="btn btn-outline" style="margin: 0 8px;">
        返回首页
      </a>
    </div>
  </main>

  <script>
    // 从URL参数获取成绩和日期
    const urlParams = new URLSearchParams(window.location.search);
    const score = urlParams.get('score') || '100';
    const date = urlParams.get('date') || new Date().toLocaleDateString('zh-CN');
    
    // 生成证书编号
    const now = new Date();
    const certId = `MC-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*1000)).padStart(3,'0')}`;
    
    // 更新证书内容
    document.getElementById('score-display').textContent = score + ' 分';
    document.getElementById('cert-date').textContent = date;
    document.getElementById('cert-id').textContent = certId;
    
    // 打印功能
    function printCertificate() {
      window.print();
    }
  </script>
</body>
</html>
